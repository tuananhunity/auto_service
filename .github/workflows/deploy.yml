name: Deploy to Server

on:
  push:
    branches:
      - main  # Thay đổi branch nếu cần

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./web/docker/backend.Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository }}/auto-service-backend:latest

    - name: Build and push novnc image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./web/docker/backend.Dockerfile  # Giả sử cùng Dockerfile, có thể cần tách nếu khác
        push: true
        tags: ghcr.io/${{ github.repository }}/auto-service-novnc:latest

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /home/auto_service
          docker-compose down
          docker pull ghcr.io/${{ github.repository }}/auto-service-backend:latest
          docker pull ghcr.io/${{ github.repository }}/auto-service-novnc:latest
          docker-compose up -d