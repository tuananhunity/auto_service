name: Deploy to Server

on:
  push:
    branches:
      - main  # Thay đổi branch nếu cần

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GH_PAT }}

    - name: Build and push shared app image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./web/docker/backend.Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/auto-service:latest

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          AUTO_SERVICE_IMAGE=ghcr.io/${{ github.repository }}/auto-service:latest
          cd /home/auto_service/web/docker
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          elif docker-compose version >/dev/null 2>&1; then
            DC=docker-compose
          else
            echo "No docker compose available on server" >&2
            exit 1
          fi
          echo "Using compose command: $DC"
          echo "Using image: $AUTO_SERVICE_IMAGE"
          pwd
          ls -la
          AUTO_SERVICE_IMAGE=$AUTO_SERVICE_IMAGE $DC -f docker-compose.yml config
          AUTO_SERVICE_IMAGE=$AUTO_SERVICE_IMAGE $DC -f docker-compose.yml down || true
          docker pull $AUTO_SERVICE_IMAGE
          AUTO_SERVICE_IMAGE=$AUTO_SERVICE_IMAGE $DC -f docker-compose.yml up -d
