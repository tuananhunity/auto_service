name: Deploy to Server

on:
  push:
    branches:
      - main  # Thay đổi branch nếu cần

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GH_PAT }}

    - name: Build and push shared app image
      timeout-minutes: 25
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./web/docker/backend.Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/auto-service:latest

    - name: Deploy to server
      timeout-minutes: 20
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        command_timeout: 20m
        script: |
          set -euo pipefail
          DEPLOY_BRANCH=${{ github.ref_name }}
          AUTO_SERVICE_IMAGE=ghcr.io/${{ github.repository }}/auto-service:latest
          cd /home/auto_service
          git fetch --depth=1 origin "$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH" || git checkout -b "$DEPLOY_BRANCH"
          git reset --hard "origin/$DEPLOY_BRANCH"
          git status --short --branch
          cd /home/auto_service/web/docker
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          elif docker-compose version >/dev/null 2>&1; then
            DC=docker-compose
          else
            echo "No docker compose available on server" >&2
            exit 1
          fi
          echo "Using branch: $DEPLOY_BRANCH"
          echo "Using compose command: $DC"
          echo "Using image: $AUTO_SERVICE_IMAGE"
          
          # Inject .env from GitHub Secrets
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
          # Ensure critical deployment variables are present
          echo "AUTO_SERVICE_IMAGE=$AUTO_SERVICE_IMAGE" >> .env
          
          pwd
          ls -la
          $DC -f docker-compose.yml config
          $DC -f docker-compose.yml down || true
          docker pull $AUTO_SERVICE_IMAGE
          $DC -f docker-compose.yml up -d
